name: Profile Metrics & Animations

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          # NOTE: lowlighter/metrics requires a classic PAT for full features.
          # Fine-grained PATs are unsupported (GitHub GraphQL API limitation).
          # Using GITHUB_TOKEN for compatibility; some plugins are disabled.
          token: ${{ secrets.GITHUB_TOKEN }}

          user: abhigyan-709
          template: classic
          filename: metrics.svg

          # Base sections
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kolkata

          # 🧠 Languages
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_details: bytes-size, percentage

          # 🏆 Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C

          # 📊 Habits (coding patterns)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes

          # 🗓️ Isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # ⭐ Stars & notable repos
          plugin_stars: yes
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_from: owned

          # 📈 Lines of code
          plugin_lines: yes

          # 👥 People
          plugin_people: yes
          plugin_people_types: followers, following

          # 📦 Repositories
          plugin_repositories: yes

  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: abhigyan-709
          outputs: |
            output/github-contribution-snake.svg
            output/github-contribution-snake-dark.svg?palette=github-dark

      - name: Push snake animation
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update contribution snake"
          add: "output/*.svg"
